name: Elio Tax Render Preview Engine

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  manage-preview:
    runs-on: ubuntu-latest
    
    # 1. Elevates token authority to bypass the HTTP 403 block
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v6

      - name: Trigger Render PR Preview
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        run: |
          echo "PR #${{ github.event.pull_request.number }} is active. Triggering build..."

      # TASK 2: Clean branch cleanup utilizing elevated API execution blocks
      - name: Auto-Merge and Delete Side Branch
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PR approved. Cleaning up git network tree..."
          gh api -X DELETE repos/${{ github.repository }}/git/refs/heads/${{ github.event.pull_request.head.ref }}