name: Elio Tax Interactive Pipeline Engine

on:
  push:
    branches-ignore:
      - master
  issue_comment:
    types: [created] # Triggers when someone comments inside a PR

jobs:
  # JOB 1: Automatically open the PR and keep it open for Render to build the live bot
  create-pr:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v6

      - name: Auto-Create Active Staging PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --base master \
              --head "${{ github.ref_name }}" \
              --title "🔍 Review Needed: ${{ github.ref_name }}" \
              --body "### 📡 Staging Bot Active! \nTest the bot responses directly inside Slack. \n\nWhen ready to deploy to production, reply to this PR with the comment: \n\`/approve-merge\`"
          fi

  # JOB 2: Listen for the magic comment, then merge and clean up everything
  human-approved-merge:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '/approve-merge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Entire Code Base
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Execute Authorized Merge and Cleanup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the current PR number from the comment context
          PR_NUM="${{ github.event.issue.number }}"
          echo "Human approval detected via comment on PR #${PR_NUM}. Commencing production release..."
          
          # Merge the PR and delete the tracking side branch instantly
          gh pr merge $PR_NUM --merge --delete-branch --admin
          echo "🎉 Production release complete. Staging server safely recycled."