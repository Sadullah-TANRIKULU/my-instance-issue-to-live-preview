name: Elio Tax Preview Engine

on:
  pull_request:
    types: [opened]

# Prevent deployment clashes if you push multiple fast updates to the same PR
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: "elio-tax-preview-pr-${{ github.event.pull_request.number }}"

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Install and Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Dynamically Launch & Deploy Preview to Fly.io
        run: |
          echo "Initializing isolated infrastructure for $APP_NAME..."
          
          # 1. Spin up a brand new independent app container slot
          flyctl apps create $APP_NAME --org personal
          
          # 2. Allocate an independent PostgreSQL instance node
          flyctl postgres create --name "$APP_NAME-db" --region fra --initial-cluster-size 1 --vm-size shared-cpu-1x
          
          # 3. Join the fresh Postgres node database to the new app container securely
          flyctl postgres attach "$APP_NAME-db" --app $APP_NAME
          
          # 4. Trigger the build execution loop
          # We force --remote-only to let Fly's servers do the heavy lifting
          # We pass --ha=false to prevent Fly from building duplicate redundant clusters (saves resources)
          flyctl deploy --app $APP_NAME --ha=false --remote-only