name: Elio Tax Render Preview Engine

on:
  pull_request:
    types: [opened, synchronize, closed]

jobs:
  manage-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v6 # Modern Node 24 support

      # TASK 3: Trigger preview deployment on an OPEN Pull Request
      - name: Trigger Render PR Preview
        if: github.event.action == 'opened' || github.event.action == 'synchronize'
        run: |
          echo "PR #${{ github.event.pull_request.number }} is active. Triggering build..."
          # Render handles the isolation automatically when you link the repo.
          # You can add a curl request here to trigger your Render deploy hook if needed:
          # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # TASK 2: Handle a CLOSED and MERGED side branch
      - name: Auto-Merge and Delete Side Branch
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PR approved. Cleaning up git network tree..."
          gh pr merge ${{ github.event.pull_request.number }} --delete-branch --admin